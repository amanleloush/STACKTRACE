<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="StackTrace logo">
  <defs>
    <linearGradient id="st-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Three call frames stepping up + to the right.
       Opacity rises with depth so the eye reads top → bottom as the
       most-recent frame. Subtle: clean geometry, gradient fill. -->
  <rect x="6"  y="42" width="38" height="9" rx="2.5" fill="url(#st-grad)" opacity="0.42"/>
  <rect x="13" y="28" width="38" height="9" rx="2.5" fill="url(#st-grad)" opacity="0.7"/>
  <rect x="20" y="14" width="38" height="9" rx="2.5" fill="url(#st-grad)"/>
</svg>
